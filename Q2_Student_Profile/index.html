<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main">
        <header class="head">
            <h1>John Doe</h1>
            <p>Computer Science Undergraduate</p>
        </header>

        <section class="info">
            <div class="part">
                <h3>About Me</h3>
                <p>Dedicated developer focused on building scalable web solutions and learning new technologies every day.</p>
            </div>
            
            <div class="part">
                <h3>Skills</h3>
                <div class="tags">
                    <span>HTML</span><span>CSS</span><span>JS</span><span>Node</span><span>Mongo</span>
                </div>
            </div>

            <div class="part">
                <h3>Education</h3>
                <table class="grid">
                    <thead><tr><th>Degree</th><th>Year</th><th>Place</th></tr></thead>
                    <tbody>
                        <tr><td>B.Tech</td><td>2025</td><td>University of Tech</td></tr>
                        <tr><td>HS School</td><td>2021</td><td>City High</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</body>
</html>
