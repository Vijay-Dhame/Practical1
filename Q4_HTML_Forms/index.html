<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Registration</title><link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main">
        <div class="left"><h1>Join Us</h1><p>Register now with 5+ details.</p></div>
        <div class="right">
            <form class="box">
                <div class="row"><label>Name</label><input type="text" placeholder="v1"></div>
                <div class="row"><label>Email</label><input type="text" placeholder="v2"></div>
                <div class="row"><label>Plan</label><div class="opt"><input type="radio" name="p"> Pro <input type="radio" name="p"> Free</div></div>
                <div class="row"><label>City</label><select><option>Pune</option><option>Mumbai</option></select></div>
                <div class="row"><label>Age</label><input type="text" placeholder="v3"></div>
                <div class="row"><label>Bio</label><textarea placeholder="v4" class="form-control" style="width:100%"></textarea></div>
                <div class="row"><label>Agree</label><input type="checkbox"> Yes</div>
                <button class="btn">Register</button>
            </form>
        </div>
    </div>
</body>
</html>
