<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Formatting</title><link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="box">
        <h1 class="head">Text Formatting Lab</h1>
        <table class="data">
            <thead><tr><th>Tag</th><th>Info</th><th>Sample</th></tr></thead>
            <tbody>
                <tr><td>&lt;b&gt;</td><td>Bold</td><td><b>Bold</b></td></tr>
                <tr><td>&lt;i&gt;</td><td>Italic</td><td><i>Italic</i></td></tr>
                <tr><td>&lt;u&gt;</td><td>Underline</td><td><u>Underline</u></td></tr>
                <tr><td>&lt;mark&gt;</td><td>Mark</td><td><mark>Mark</mark></td></tr>
                <tr><td>&lt;strong&gt;</td><td>Strong</td><td><strong>Strong</strong></td></tr>
                <tr><td>&lt;em&gt;</td><td>Emphasized</td><td><em>Emphasized</em></td></tr>
                <tr><td>&lt;small&gt;</td><td>Small</td><td><small>Small</small></td></tr>
                <tr><td>&lt;del&gt;</td><td>Deleted</td><td><del>Deleted</del></td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
